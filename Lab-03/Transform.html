<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Transform Gallery</title>
    <link rel="stylesheet" href="Styles/effects.css">
</head>

<body>

<header>
    <h1>CSS Transform Gallery</h1>
    <p>Examples of Rotation, Scaling, Translation, 3D Effects and Combined Transforms</p>
</header>

<section class="gallery">

    <!-- Rotation -->
    <div class="card rotate">
        <h3>Rotation</h3>
        <div class="box">Rotate</div>
    </div>

    <!-- Scaling -->
    <div class="card scale">
        <h3>Scaling</h3>
        <div class="box">Scale</div>
    </div>

    <!-- Translation -->
    <div class="card translate">
        <h3>Translation</h3>
        <div class="box">Move</div>
    </div>

    <!-- 3D Transform -->
    <div class="card threeD">
        <h3>3D Rotate</h3>
        <div class="box">3D</div>
    </div>

    <!-- Transform Origin -->
    <div class="card origin">
        <h3>Transform Origin</h3>
        <div class="box">Origin</div>
    </div>

    <!-- Combined Transform -->
    <div class="card combine">
        <h3>Combined Transform</h3>
        <div class="box">Combo</div>
    </div>

</section>

<footer>
    <p>CSS Transform Gallery Demo</p>
</footer>

</body>
</html>
